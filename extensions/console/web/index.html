<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dolly Console</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: #1a1a2e; color: #eee; height: 100vh; display: flex; flex-direction: column; }
    #messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
    .msg { padding: 8px 12px; border-radius: 8px; max-width: 80%; word-wrap: break-word; }
    .msg.user { align-self: flex-end; background: #0f3460; }
    .msg.bot  { align-self: flex-start; background: #16213e; }
    .msg .src { font-size: 0.75em; opacity: 0.6; margin-bottom: 2px; }
    #input-bar { display: flex; gap: 8px; padding: 12px; background: #16213e; }
    #input-bar input { flex: 1; padding: 10px; border: none; border-radius: 6px; background: #0f3460; color: #eee; font-size: 1em; }
    #input-bar button { padding: 10px 20px; border: none; border-radius: 6px; background: #e94560; color: #fff; cursor: pointer; font-size: 1em; }
    #status { text-align: center; padding: 4px; font-size: 0.8em; opacity: 0.5; }
  </style>
</head>
<body>
  <div id="status">connecting…</div>
  <div id="messages"></div>
  <div id="input-bar">
    <input id="text" type="text" placeholder="Type a message…" />
    <button id="send">Send</button>
  </div>
  <script>
    const ws = new WebSocket(`ws://${location.hostname}:3000`);
    const messagesEl = document.getElementById("messages");
    const statusEl = document.getElementById("status");
    const textEl = document.getElementById("text");

    function addMsg(text, cls, src) {
      const div = document.createElement("div");
      div.className = `msg ${cls}`;
      if (src) div.innerHTML = `<div class="src">${src}</div>`;
      div.appendChild(document.createTextNode(text));
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    ws.onopen = () => { statusEl.textContent = "connected"; };
    ws.onclose = () => { statusEl.textContent = "disconnected"; };

    ws.onmessage = (e) => {
      const msg = JSON.parse(e.data);
      if (msg.type === "history") {
        for (const h of msg.messages) {
          const text = extractText(h.payload);
          if (text) addMsg(text, h.direction === "incoming" ? "user" : "bot", h.payload.source);
        }
      } else if (msg.type === "incoming") {
        addMsg(extractText(msg) || "[no text]", "bot", msg.source);
      }
    };

    function extractText(obj) {
      if (obj.text) return obj.text;
      if (Array.isArray(obj.content)) {
        return obj.content.filter(i => i.type === "text").map(i => i.text).join("\n");
      }
      return "";
    }

    function send() {
      const text = textEl.value.trim();
      if (!text) return;
      ws.send(JSON.stringify({ type: "user_input", text }));
      addMsg(text, "user", "you");
      textEl.value = "";
    }

    document.getElementById("send").onclick = send;
    textEl.onkeydown = (e) => { if (e.key === "Enter") send(); };
  </script>
</body>
</html>
