<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dolly Console</title>
<style>
  :root {
    --bg: #1a1a2e;
    --surface: #16213e;
    --text: #e0e0e0;
    --accent: #7c83ff;
    --outer: #2a3a5c;
    --inner: #1e3a5f;
    --speak: #7cff8b;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    max-width: 900px;
    margin: 0 auto;
  }
  header {
    padding: 12px 16px;
    background: var(--surface);
    border-bottom: 1px solid #2a2a4a;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  header h1 { font-size: 1.1em; font-weight: 600; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #4a4; }
  .dot.disconnected { background: #a44; }
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .msg {
    padding: 10px 14px;
    border-radius: 12px;
    max-width: 85%;
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .msg.outer {
    background: var(--outer);
    align-self: flex-end;
    border-bottom-right-radius: 4px;
  }
  .msg.inner {
    background: var(--inner);
    align-self: flex-start;
    border-bottom-left-radius: 4px;
    color: var(--speak);
  }
  .msg.status {
    align-self: center;
    background: transparent;
    color: #666;
    font-size: 0.8em;
  }
  footer {
    padding: 12px 16px;
    background: var(--surface);
    border-top: 1px solid #2a2a4a;
    display: flex;
    gap: 8px;
  }
  footer input {
    flex: 1;
    padding: 10px 14px;
    border-radius: 20px;
    border: 1px solid #3a3a5a;
    background: var(--bg);
    color: var(--text);
    font-size: 0.95em;
    outline: none;
  }
  footer input:focus { border-color: var(--accent); }
  footer button {
    padding: 10px 20px;
    border-radius: 20px;
    border: none;
    background: var(--accent);
    color: #fff;
    font-weight: 600;
    cursor: pointer;
    font-size: 0.9em;
  }
  footer button:hover { opacity: 0.9; }
  footer button:disabled { opacity: 0.5; }
</style>
</head>
<body>
<header>
  <span class="dot" id="statusDot"></span>
  <h1>Dolly Console</h1>
</header>
<div id="messages"></div>
<footer>
  <input id="input" type="text" placeholder="输入消息..." autofocus />
  <button id="sendBtn">发送</button>
</footer>
<script>
  const $ = (s) => document.querySelector(s);
  const msgs = $("#messages");
  const input = $("#input");
  const btn = $("#sendBtn");
  const dot = $("#statusDot");

  function addMsg(text, type) {
    const d = document.createElement("div");
    d.className = "msg " + type;
    d.textContent = text;
    msgs.appendChild(d);
    msgs.scrollTop = msgs.scrollHeight;
  }

  // Load history on page load
  (async () => {
    try {
      const resp = await fetch('/history');
      const data = await resp.json();
      for (const entry of (data.history || [])) {
        if (typeof entry === "object" && entry.type) {
          addMsg(entry.text, entry.type === "user" ? "outer" : "inner");
        } else if (typeof entry === "string") {
          addMsg(entry.startsWith("> ") ? entry.slice(2) : entry, entry.startsWith("> ") ? "outer" : "inner");
        }
      }
    } catch {}
  })();

  function connect() {
    const proto = location.protocol === "https:" ? "wss" : "ws";
    const ws = new WebSocket(`${proto}://${location.host}/ws`);
    ws.onopen = () => {
      dot.classList.remove("disconnected");
      addMsg("已连接", "status");
      btn.disabled = false;
    };
    ws.onclose = () => {
      dot.classList.add("disconnected");
      addMsg("连接断开，3秒后重连...", "status");
      btn.disabled = true;
      setTimeout(connect, 3000);
    };
    ws.onmessage = (e) => {
      try {
        const obj = JSON.parse(e.data);
        if (obj.type === "speak") {
          addMsg(obj.text, "inner");
        } else if (obj.type === "status") {
          addMsg(obj.text, "status");
        }
      } catch {
        addMsg(e.data, "inner");
      }
    };

    function send() {
      const text = input.value.trim();
      if (!text || ws.readyState !== WebSocket.OPEN) return;
      addMsg(text, "outer");
      ws.send(JSON.stringify({ type: "input", text }));
      input.value = "";
    }

    btn.onclick = send;
    input.onkeydown = (e) => { if (e.key === "Enter") send(); };
    window._ws = ws;
  }

  connect();
</script>
</body>
</html>
