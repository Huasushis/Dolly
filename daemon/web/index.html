<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dolly Daemon</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0d1117; color: #c9d1d9; font-family: system-ui, sans-serif; padding: 2rem; }
  h1 { font-size: 1.4rem; margin-bottom: 1.5rem; color: #58a6ff; }
  .bar { display: flex; gap: .75rem; margin-bottom: 1.5rem; align-items: center; }
  .bar input { flex: 1; background: #161b22; border: 1px solid #30363d; color: #c9d1d9; padding: .45rem .7rem; border-radius: 6px; font-size: .85rem; }
  button { background: #238636; color: #fff; border: none; padding: .45rem .9rem; border-radius: 6px; cursor: pointer; font-size: .85rem; }
  button:hover { background: #2ea043; }
  button.stop { background: #da3633; }
  button.stop:hover { background: #f85149; }
  table { width: 100%; border-collapse: collapse; }
  th, td { text-align: left; padding: .5rem .7rem; border-bottom: 1px solid #21262d; font-size: .85rem; }
  th { color: #8b949e; font-weight: 500; }
  .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
  .dot.running { background: #3fb950; }
  .dot.stopped { background: #6e7681; }
  #login { max-width: 340px; margin: 6rem auto; background: #161b22; padding: 1.5rem; border-radius: 8px; border: 1px solid #30363d; }
  #login h2 { margin-bottom: 1rem; font-size: 1.1rem; }
  #login label { display: block; margin: .6rem 0 .2rem; font-size: .82rem; color: #8b949e; }
  #login input { width: 100%; background: #0d1117; border: 1px solid #30363d; color: #c9d1d9; padding: .45rem; border-radius: 6px; }
  #login button { width: 100%; margin-top: 1rem; }
  .err { color: #f85149; font-size: .82rem; margin-top: .5rem; }
</style>
</head>
<body>

<div id="login" style="display:none">
  <h2>Dolly Daemon Login</h2>
  <label>Username</label>
  <input id="user" value="admin">
  <label>Password</label>
  <input id="pass" type="password">
  <button onclick="doLogin()">Login</button>
  <div id="loginErr" class="err"></div>
</div>

<div id="panel" style="display:none">
  <h1>Dolly Daemon</h1>
  <div class="bar">
    <input id="cfgPath" placeholder="Config file path, e.g. dolly.json">
    <button onclick="startInstance()">Start</button>
    <button onclick="refresh()">Refresh</button>
  </div>
  <table>
    <thead><tr><th>Status</th><th>Config Path</th><th>PID</th><th>Port</th><th>Started</th><th>Action</th></tr></thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<script>
let auth = localStorage.getItem("dolly_auth") || "";
const $ = (s) => document.getElementById(s);

async function api(method, path, body) {
  const opts = { method, headers: { "Authorization": "Basic " + btoa(auth), "Content-Type": "application/json" } };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(path, opts);
  if (r.status === 401) { showLogin(); throw new Error("Unauthorized"); }
  return r.json();
}

function showLogin() { $("login").style.display = "block"; $("panel").style.display = "none"; }
function showPanel() { $("login").style.display = "none"; $("panel").style.display = "block"; }

function doLogin() {
  auth = $("user").value + ":" + $("pass").value;
  api("GET", "/api/health").then(() => {
    localStorage.setItem("dolly_auth", auth);
    showPanel(); refresh();
  }).catch(() => { $("loginErr").textContent = "Invalid credentials"; });
}

async function refresh() {
  try {
    const list = await api("GET", "/api/instances");
    $("tbody").innerHTML = list.map(i => `<tr>
      <td><span class="dot ${i.status}"></span>${i.status}</td>
      <td>${i.configPath}</td><td>${i.pid}</td><td>${i.port}</td>
      <td>${new Date(i.startedAt).toLocaleString()}</td>
      <td>${i.status === "running" ? `<button class="stop" onclick="stopInstance('${i.configPath.replace(/'/g,"\\'")}')">Stop</button>` : "—"}</td>
    </tr>`).join("");
  } catch {}
}

async function startInstance() {
  const p = $("cfgPath").value.trim();
  if (!p) return;
  await api("POST", "/api/instances/start", { configPath: p });
  $("cfgPath").value = ""; refresh();
}

async function stopInstance(path) {
  await api("POST", "/api/instances/stop", { configPath: path }); refresh();
}

// Init
if (auth) { showPanel(); refresh(); } else { showLogin(); }
setInterval(() => { if ($("panel").style.display !== "none") refresh(); }, 5000);
</script>
</body>
</html>
